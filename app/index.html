<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine To-Do Liste</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📝 Meine To-Do Liste</h1>
        
        <!-- Eingabebereich -->
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Was möchtest du erledigen?">
            <button id="addBtn">Hinzufügen</button>
        </div>

        <!-- Die Liste -->
        <ul id="todoList">
            <!-- Hier werden die Einträge per JavaScript eingefügt -->
        </ul>

        <!-- 🚀 FEATURE (Story 3): Entferne die Kommentarzeichen hier und im JavaScript, um den Button zu aktivieren! -->
        <!--
        <div class="clear-section">
            <button id="clearAllBtn" class="clear-btn">Alle löschen</button>
        </div>
        -->
    </div>

    <script src="app.js"></script>
</body>
</html>
